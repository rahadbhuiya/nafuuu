<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heart Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(circle at center, #120000 0%, #000 70%);
    }

    .text {
      position: fixed;
      left: 50%;
      top: 78%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: clamp(24px, 5vw, 52px);
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
      text-shadow:
        0 0 8px #ff2d55,
        0 0 18px #ff2d55,
        0 0 35px #ff0033;
      animation: glow 1.8s ease-in-out infinite alternate;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    @keyframes glow {
      from {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.9;
      }
      to {
        transform: translate(-50%, -50%) scale(1.04);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="text">i love u nafuuuu</div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 900;

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);

    function heartPoint(t, scale = 1) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t)
      );
      return { x: x * scale, y: y * scale };
    }

    class Particle {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        this.t = Math.random() * Math.PI * 2;
        this.baseScale = Math.min(w, h) * 0.015;
        this.offset = Math.random() * 18 - 9;
        this.size = Math.random() * 2.2 + 1;
        this.speed = Math.random() * 0.015 + 0.005;
        this.alpha = Math.random() * 0.5 + 0.5;
        this.twinkle = Math.random() * Math.PI * 2;

        const p = heartPoint(this.t, this.baseScale + this.offset);
        this.x = w / 2 + p.x;
        this.y = h / 2 + p.y - 40;

        if (!initial) {
          this.t = Math.random() * Math.PI * 2;
        }
      }

      update(time) {
        this.t += this.speed;
        if (this.t > Math.PI * 2) {
          this.t -= Math.PI * 2;
        }

        const pulse = 1 + Math.sin(time * 0.003) * 0.06;
        const p = heartPoint(this.t, (this.baseScale + this.offset) * pulse);

        this.x = w / 2 + p.x;
        this.y = h / 2 + p.y - 40;

        this.currentAlpha = this.alpha * (0.65 + 0.35 * Math.sin(time * 0.005 + this.twinkle));
      }

      draw() {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 20, 60, ${this.currentAlpha})`;
        ctx.shadowColor = "rgba(255, 0, 60, 0.9)";
        ctx.shadowBlur = 10;
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function drawHeartGlow(time) {
      ctx.save();
      ctx.translate(w / 2, h / 2 - 40);

      const pulse = 1 + Math.sin(time * 0.003) * 0.06;
      const scale = Math.min(w, h) * 0.015 * pulse;

      ctx.beginPath();
      for (let t = 0; t <= Math.PI * 2 + 0.05; t += 0.02) {
        const p = heartPoint(t, scale);
        if (t === 0) {
          ctx.moveTo(p.x, p.y);
        } else {
          ctx.lineTo(p.x, p.y);
        }
      }

      ctx.closePath();
      ctx.strokeStyle = "rgba(255, 40, 80, 0.22)";
      ctx.lineWidth = 10;
      ctx.shadowColor = "rgba(255, 0, 60, 0.45)";
      ctx.shadowBlur = 30;
      ctx.stroke();

      ctx.restore();
    }

    function animate(time) {
      ctx.clearRect(0, 0, w, h);

      drawHeartGlow(time);

      for (const particle of particles) {
        particle.update(time);
        particle.draw();
      }

      requestAnimationFrame(animate);
    }

    animate(0);
  </script>
</body>
</html>
